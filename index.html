<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Inscripción a programas de Posgrado | INAOE</title>

    
    <link href="https://framework-gb.cdn.gob.mx/assets/styles/main.css" rel="stylesheet">

    <style>
        body{
            background:#fff;
        }

        .page-header{
            margin-top:40px;
        }

        .tramite-title{
            color:#333;
            font-weight:600;
            margin-bottom:10px;
        }

        .info-box{
            background:#f5f5f5;
            border-left:6px solid #9d2449;
            padding:20px;
            margin:25px 0;
        }

        .section-title{
            margin-top:45px;
        }

        .panel-custom{
            border:1px solid #ddd;
            border-radius:4px;
            padding:25px;
            margin-bottom:25px;
        }

        .btn-tramite{
            margin-top:15px;
        }

        .sidebar-box{
            background:#f9f9f9;
            padding:20px;
            border:1px solid #e5e5e5;
            margin-bottom:20px;
        }

        footer{
            margin-top:60px;
        }
    </style>
</head>

<body>

<header>
    <nav class="navbar navbar-inverse sub-navbar navbar-fixed-top">
        <div class="container">
            <div class="navbar-header">
                <a class="navbar-brand" href="#">
                    gob.mx
                </a>
            </div>
        </div>
    </nav>
</header>

<main class="page">

    <div class="container">

        <!-- Breadcrumb -->
        <ol class="breadcrumb">
            <li>
                <a href="#">Inicio</a>
            </li>
            <li>
                <a href="#">Trámites</a>
            </li>
            <li class="active">
                Inscripción a programas de Posgrado
            </li>
        </ol>

        <!-- Encabezado -->
        <div class="page-header">
            <h1 class="tramite-title">
                Inscripción a programas de Posgrado
            </h1>

            <p class="lead">
                Realiza tu inscripción a los programas de posgrado del INAOE.
            </p>

            <hr class="red">
        </div>

        <div class="row">

  <form role="form">
  <div class="form-group">
    <label class="control-label" for="email-01">Correo electrónico:</label>
    <input class="form-control" id="email-01" placeholder="Correo electrónico" type="text">
  </div>
  <div class="form-group">
    <label class="control-label" for="password-01">Contraseña</label>
    <input class="form-control" id="password-01" placeholder="Contraseña" type="password">
  </div>
  <div class="form-group">
    <label class="control-label" for="file-01">Cargar archivo:</label>
    <input id="file-01" type="file">
  </div>
  <div class="checkbox">
    <label>
      <input type="checkbox">
      Acepto los términos
    </label>
  </div>
  <div class="form-group">
    <textarea class="form-control" rows="3"></textarea>
  </div>
  <button class="btn btn-primary pull-right" type="submit">Enviar</button>
</form>

<form class="form-inline" role="form">
  <div class="form-group">
    <label class="sr-only" for="email-02">Correo electrónico:</label>
    <input class="form-control" id="email-02" placeholder="Ingrese su email" type="text">
  </div>
  <div class="form-group">
    <label class="sr-only" for="password-02">Contraseña</label>
    <input class="form-control" id="password-02" placeholder="Ingrese su contraseña" type="password">
  </div>
  <div class="checkbox">

<script src="https://framework-gb.cdn.gob.mx/gobmx.js"></script>

</body>
</html>
